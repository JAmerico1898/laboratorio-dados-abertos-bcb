<style>
  /* ===== Reusable logo component =====
     White background baked in -> looks identical everywhere.
     Change --finlab-size to scale the whole logo.          */
  .finlab-logo {
    --finlab-size: 200px;          /* the only value you normally change */
    display: inline-block;
    width: var(--finlab-size);
    height: auto;
    line-height: 0;                /* removes inline-image gap */
    background: #ffffff;           /* the white background you wanted */
  }
  .finlab-logo img {
    width: 100%;
    height: auto;
    display: block;
  }

  /* ===== demo page only (not part of the logo) ===== */
  body {
    margin: 0; min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    background: #f5f6f8;
    font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
  }
</style>
